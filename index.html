<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Altmetric + Dimensions Badge</title>

  <!-- Altmetric -->
  <script type="text/javascript" src="https://embed.altmetric.com/assets/embed.js"></script>

  <!-- Dimensions -->
  <script async src="https://badge.dimensions.ai/static/ai/badge.js" charset="utf-8"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .paper {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      width: fit-content;
    }

    .text {
      font-size: 16px;
      line-height: 1.3;
      max-width: 320px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .meta {
      color: #444;
      font-size: 13px;
    }

    .badges {
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>

<body>
  <div class="paper">

    <!-- TEXT -->
    <div class="text">
      <div class="title">
        Climate and ecosystem service benefits of forests and trees for agriculture
      </div>
      <div class="meta">FAO, 2024</div>
    </div>

    <!-- BADGES -->
    <div class="badges">

      <!-- Dimensions badge -->
      <span class="__dimensions_badge_embed__" 
        data-doi="10.4060/cd7599en" 
        data-legend="always"></span>
      <script async src="https://badge.dimensions.ai/static/ai/badge.js" charset="utf-8"></script>

      <!-- Altmetric badge -->
      <div class="altmetric-embed"
           data-doi="10.4060/cd7599en"
           data-badge-type="medium-donut"
           class='altmetric-embed'
          data-badge-details='right'
           data-hide-no-mentions="true">
      </div>

    </div>

  </div>
</body>
</html>
