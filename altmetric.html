<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Altmetric Badge</title>
  <script type="text/javascript" src="https://embed.altmetric.com/assets/embed.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .paper {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      width: fit-content;
    }

    .text {
      font-size: 14px;
      line-height: 1.3;
      max-width: 260px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .meta {
      color: #444;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="paper">
    <div class="altmetric-embed"
         data-doi="10.1038/s41586-020-2649-2"
         data-badge-type="donut"
         data-badge-popover="right"
         data-hide-no-mentions="true">
    </div>
    <div class="text">
      <div class="title">Paper title here</div>
      <div class="meta">Journal, Year</div>
    </div>
  </div>
</body>
</html>
